<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#16213e">
    <title>Audio Player</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --accent: #0f3460;
            --highlight: #e94560;
            --text: #eee;
            --text2: #aaa;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            padding: 16px;
            max-width: 550px;
            margin: 0 auto;
            -webkit-tap-highlight-color: transparent;
        }
        header h1 { font-size: 1.3rem; text-align: center; margin-bottom: 8px; }
        #tabs { display: flex; gap: 8px; justify-content: center; margin: 8px 0 16px; }
        #tabs button {
            background: var(--accent); border: none; color: var(--text);
            padding: 10px 24px; border-radius: 30px; font-size: 1rem;
            cursor: pointer;
        }
        #tabs button.active { background: var(--highlight); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        button {
            background: var(--accent); color: var(--text); border: none;
            padding: 8px 14px; border-radius: 8px; font-size: 0.9rem;
            cursor: pointer;
        }
        button:active { transform: scale(0.97); background: var(--highlight); }

        #folder-section { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
        #folder-name { color: var(--text2); font-size: 0.75rem; flex: 1; word-break: break-all; }

        #playlist-search-section { margin-bottom: 8px; display: flex; gap: 8px; }
        #playlist-search {
            flex: 1;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 20px;
            padding: 8px 12px;
            color: var(--text);
            font-size: 0.8rem;
        }
        #playlist-search::placeholder { color: var(--text2); }
        #playlist-search-clear {
            background: var(--accent);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
        }
        #loading-overlay.active { visibility: visible; }
        .loader-text { font-size: 1rem; margin-bottom: 16px; color: var(--highlight); }
        .loader-bar { width: 80%; max-width: 300px; height: 4px; background: var(--accent); border-radius: 4px; overflow: hidden; }
        .loader-fill { width: 0%; height: 100%; background: var(--highlight); transition: width 0.2s; }
        .loader-detail { font-size: 0.7rem; color: var(--text2); margin-top: 12px; }

        #playlist {
            list-style: none;
            max-height: 250px;
            overflow-y: auto;
            background: var(--surface);
            border-radius: 8px;
            margin-bottom: 10px;
        }
        #playlist li {
            padding: 10px 14px;
            border-bottom: 1px solid var(--accent);
            cursor: pointer;
            font-size: 0.85rem;
        }
        #playlist li:active { background: var(--highlight); }
        #playlist li.active { background: var(--highlight); }
        #playlist li .cue-badge { font-size: 0.65rem; background: #0f3460; padding: 1px 5px; border-radius: 4px; margin-left: 6px; }
        #now-playing { text-align: center; margin-bottom: 8px; }
        #track-title { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #track-time { color: var(--text2); font-size: 0.8rem; }
        #controls { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
        #seek-bar { width: 100%; margin: 4px 0; }
        #chk-gapless-row { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: #aaa; margin: 4px 0; }
        #effects-panel { margin-top: 12px; padding-top: 8px; border-top: 1px solid var(--accent); }
        #effects-panel h2 { font-size: 0.95rem; margin-bottom: 6px; }
        #effects-panel label { display: flex; justify-content: space-between; font-size: 0.8rem; margin-top: 4px; color: var(--text2); }
        #effects-panel input[type="range"] { width: 100%; }
        .preset-btns { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
        .preset-btns button { font-size: 0.7rem; padding: 4px 8px; }
        .preset-tip { font-size: 0.7rem; color: var(--text2); margin-top: 2px; }
        #eq-bands { display: flex; gap: 4px; align-items: flex-end; height: 100px; margin-top: 6px; }
        .eq-band { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .eq-band input { writing-mode: vertical-lr; direction: rtl; height: 75px; width: 18px; }
        .eq-band span { font-size: 0.55rem; color: var(--text2); margin-top: 2px; }
        #radio-section input, #radio-section select {
            background: #16213e; color: #eee; border: 1px solid #0f3460;
            border-radius: 6px; padding: 10px; font-size: 0.85rem; width: 100%; margin-bottom: 8px;
        }
        .radio-controls { display: flex; gap: 8px; margin-top: 8px; }
        .radio-controls button { flex: 1; }
        #radio-status { font-size: 0.8rem; color: #aaa; margin-top: 8px; text-align: center; }
        details { margin-top: 6px; font-size: 0.75rem; }
        details summary { cursor: pointer; color: var(--highlight); }
        .search-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .search-row input { flex: 1; margin-bottom: 0; }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; margin-left: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .station-item, .favorite-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            background: var(--surface);
            margin: 4px 0;
            border-radius: 10px;
            cursor: pointer;
        }
        .station-item:active, .favorite-item:active { background: var(--accent); }
        .station-name, .favorite-name { flex: 1; font-size: 0.85rem; word-break: break-word; }
        .station-country { font-size: 0.65rem; color: var(--text2); margin-top: 2px; }
        .station-codec { font-size: 0.6rem; background: var(--accent); padding: 2px 6px; border-radius: 12px; }
        .station-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        .delete-btn { background: none; color: var(--highlight); font-size: 1rem; padding: 4px 8px; }
        .pagination { display: flex; justify-content: center; gap: 12px; margin: 12px 0 8px; }
        .pagination button { padding: 6px 16px; font-size: 0.75rem; }
        .page-info { font-size: 0.7rem; color: var(--text2); text-align: center; margin-top: 4px; }
        .section-header { font-size: 0.75rem; color: var(--highlight); font-weight: bold; margin: 16px 0 8px; display: flex; justify-content: space-between; }
        .stations-container { max-height: 320px; overflow-y: auto; border-radius: 8px; }
        .empty-message { color: var(--text2); font-size: 0.75rem; text-align: center; padding: 20px; background: var(--surface); border-radius: 10px; }
    </style>
</head>
<body>
    <header><h1>🎧 Audio Player</h1></header>
    <div id="tabs">
        <button class="tab active" data-tab="audio">🎵 Аудио</button>
        <button class="tab" data-tab="radio">📻 Радио</button>
    </div>

    <div id="tab-audio" class="tab-content active">
        <div id="folder-section">
            <button id="btn-select-folder">🎵 Выбрать треки</button>
            <button id="btn-clear-playlist" style="background:#e94560;">🗑 Очистить список</button>
            <input type="file" id="file-input" multiple accept="audio/*" style="display:none;">
            <span id="folder-name">Не выбрано</span>
        </div>

        <div id="playlist-search-section">
            <input type="text" id="playlist-search" placeholder="🔍 Поиск по плейлисту">
            <button id="playlist-search-clear">✖</button>
        </div>

        <ul id="playlist"></ul>
        <div id="playlist-stats" style="font-size:0.65rem; color:var(--text2); text-align:center; margin-bottom:6px;"></div>

        <div id="now-playing">
            <div id="track-title">Нет трека</div>
            <div id="track-time">0:00 / 0:00</div>
        </div>
        <div id="controls">
            <button id="btn-prev">⏮ 10с</button>
            <button id="btn-play">▶️</button>
            <button id="btn-next">10с ⏭</button>
            <button id="btn-stop">⏹</button>
        </div>
        <div id="chk-gapless-row"><input type="checkbox" id="chk-gapless" checked> 🪡 Gapless</div>
        <input type="range" id="seek-bar" min="0" max="100" value="0" step="0.1">
    </div>

    <div id="tab-radio" class="tab-content">
        <div id="radio-section">
            <h2 style="font-size:0.95rem;margin-bottom:8px;">📻 Интернет-радио</h2>
            <div class="search-row">
                <input type="text" id="online-search" placeholder="🔍 Поиск (например: pink floyd, rock, jazz)">
                <button id="btn-online-search">🔍 Искать</button>
            </div>
            <div class="section-header"><span>📡 Результаты поиска</span><span id="results-count"></span></div>
            <div id="search-results-container" class="stations-container"></div>
            <div class="pagination" id="search-pagination">
                <button id="btn-prev-page" disabled>◀ Пред.</button>
                <button id="btn-next-page">След. ▶</button>
            </div>
            <div class="page-info" id="page-info"></div>
            <div class="section-header"><span>⭐ Избранное</span><span id="fav-count"></span></div>
            <div id="favorites-container" class="stations-container"></div>
            <div class="pagination" id="favorites-pagination">
                <button id="btn-fav-prev" disabled>◀ Пред.</button>
                <button id="btn-fav-next">След. ▶</button>
            </div>
            <div class="page-info" id="fav-page-info"></div>
            <div style="margin-top: 16px;">
                <input type="text" id="station-url" placeholder="➕ Или введите URL потока...">
                <input type="text" id="station-name" placeholder="Название станции" style="margin-top:4px;">
            </div>
            <div style="display:flex;gap:8px;margin-top:8px;">
                <button id="btn-add-station">💾 В избранное</button>
                <button id="btn-export">📤 Экспорт</button>
                <button id="btn-import">📥 Импорт</button>
            </div>
            <div class="radio-controls">
                <button id="btn-radio-play">▶️ Играть</button>
                <button id="btn-radio-stop">⏹ Стоп</button>
            </div>
            <div id="radio-status">⚡ Введите запрос и нажмите "Искать"</div>
        </div>
    </div>

    <div id="effects-panel">
        <h2>🎛 Эффекты</h2>
        <label>Реверберация <span id="val-reverb">0</span>%</label>
        <input type="range" id="reverb" min="0" max="100" value="0">
        <label>Дилей <span id="val-delay">0</span>%</label>
        <input type="range" id="delay" min="0" max="100" value="0">
        <label>Стереобаза <span id="val-stereo">0</span>%</label>
        <input type="range" id="stereo" min="0" max="100" value="0">
        <div id="space-presets"><div class="preset-btns"></div><div class="preset-tip" id="space-tip"></div></div>
        <div id="eq-presets"><div class="preset-btns"></div><div class="preset-tip" id="eq-tip"></div></div>
        <div id="eq-section"><div id="eq-bands"></div></div>
        <details><summary>💡 Шпаргалка</summary><div><b>Ревер</b> — эхо<br><b>Дилей</b> — повтор<br><b>Стереобаза</b> — ширина</div></details>
    </div>

    <div id="loading-overlay">
        <div class="loader-text">⏳ Загрузка...</div>
        <div class="loader-bar"><div class="loader-fill" id="loader-fill"></div></div>
        <div class="loader-detail" id="loader-detail"></div>
    </div>

    <script>
        const isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent);

        // DOM элементы
        const btnSelect = document.getElementById('btn-select-folder');
        const fileInput = document.getElementById('file-input');
        const folderNameEl = document.getElementById('folder-name');
        const playlistEl = document.getElementById('playlist');
        const playlistStats = document.getElementById('playlist-stats');
        const trackTitle = document.getElementById('track-title');
        const trackTime = document.getElementById('track-time');
        const btnPlay = document.getElementById('btn-play');
        const btnStop = document.getElementById('btn-stop');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const seekBar = document.getElementById('seek-bar');
        const reverbSlider = document.getElementById('reverb');
        const delaySlider = document.getElementById('delay');
        const stereoSlider = document.getElementById('stereo');
        const valReverb = document.getElementById('val-reverb');
        const valDelay = document.getElementById('val-delay');
        const valStereo = document.getElementById('val-stereo');
        const eqBandsDiv = document.getElementById('eq-bands');
        const chkGapless = document.getElementById('chk-gapless');
        const playlistSearch = document.getElementById('playlist-search');
        const playlistSearchClear = document.getElementById('playlist-search-clear');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loaderFill = document.getElementById('loader-fill');
        const loaderDetail = document.getElementById('loader-detail');
        const btnClearPlaylist = document.getElementById('btn-clear-playlist');

        let audioContext = null;
        let fullPlaylist = [];
        let playlist = [];
        let currentIndex = -1;
        let currentSource = null;
        let currentBuffer = null;
        let nextBuffer = null;
        let startTime = 0;
        let pausedAt = 0;
        let isPlaying = false;
        let animationId = null;
        let seekDragging = false;
        let isSeeking = false;
        let seekTimeout = null;
        let isLoadingTrack = false;
        let currentSearchQuery = '';

        let eqFilters = [];
        let stereoWidener = null;
        let delayNode = null;
        let delayFeedbackNode = null;
        let delayWetGain = null;
        let convolver = null;
        let reverbWetGain = null;
        let dryGain = null;
        let masterGain = null;
        let graphInput = null;
        let graphBuilt = false;
        let radioAudio = null;
        let radioSource = null;

        const EQ_FREQS = [31, 62, 125, 250, 500, 1000, 2000, 4000, 8000, 16000];
        const bufferCache = new Map();
        const MAX_CACHE = 15;

        function showLoader(text, detail) {
            loadingOverlay.classList.add('active');
            if (text) document.querySelector('.loader-text').innerHTML = text;
            if (detail) loaderDetail.textContent = detail;
            loaderFill.style.width = '0%';
        }
        function updateLoaderProgress(percent, detail) {
            loaderFill.style.width = Math.min(100, percent) + '%';
            if (detail) loaderDetail.textContent = detail;
        }
        function hideLoader() { loadingOverlay.classList.remove('active'); }

        function buildAudioGraph() {
            if (graphBuilt) return graphInput;
            const ctx = audioContext;
            graphInput = ctx.createGain();
            dryGain = ctx.createGain();
            stereoWidener = ctx.createGain();
            delayNode = ctx.createDelay(2.0);
            delayNode.delayTime.value = 0.3;
            delayFeedbackNode = ctx.createGain();
            delayFeedbackNode.gain.value = 0.3;
            delayWetGain = ctx.createGain();
            delayNode.connect(delayFeedbackNode);
            delayFeedbackNode.connect(delayNode);
            convolver = ctx.createConvolver();
            convolver.buffer = createReverbImpulse(ctx, isMobile ? 0.8 : 1.5);
            reverbWetGain = ctx.createGain();
            eqFilters = EQ_FREQS.map(f => {
                const fn = ctx.createBiquadFilter();
                fn.type = 'peaking';
                fn.frequency.value = f;
                fn.Q.value = 1;
                fn.gain.value = 0;
                return fn;
            });
            for (let i = 0; i < eqFilters.length - 1; i++) eqFilters[i].connect(eqFilters[i + 1]);
            masterGain = ctx.createGain();
            masterGain.gain.value = 0.8;
            masterGain.connect(ctx.destination);
            graphInput.connect(eqFilters[0]);
            const eqEnd = eqFilters[eqFilters.length - 1];
            eqEnd.connect(dryGain);
            dryGain.connect(masterGain);
            eqEnd.connect(stereoWidener);
            stereoWidener.connect(masterGain);
            eqEnd.connect(delayNode);
            delayNode.connect(delayWetGain);
            delayWetGain.connect(masterGain);
            eqEnd.connect(convolver);
            convolver.connect(reverbWetGain);
            reverbWetGain.connect(masterGain);
            graphBuilt = true;
            applySavedSettings();
            return graphInput;
        }

        function createReverbImpulse(ctx, duration) {
            const sr = ctx.sampleRate;
            const len = Math.floor(sr * duration);
            const buf = ctx.createBuffer(2, len, sr);
            for (let ch = 0; ch < 2; ch++) {
                const d = buf.getChannelData(ch);
                for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 1.5);
            }
            return buf;
        }

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: isMobile ? 'playback' : 'interactive' });
                buildAudioGraph();
            }
            if (audioContext.state === 'suspended') audioContext.resume();
            return audioContext;
        }

        function stopRadio() {
            if (radioAudio) { try { radioAudio.pause(); radioAudio.src = ''; } catch(e) {} radioAudio = null; }
            if (radioSource) { try { radioSource.disconnect(); } catch(e) {} radioSource = null; }
            const rs = document.getElementById('radio-status');
            if (rs) { rs.textContent = '⏹ Остановлено'; rs.style.color = '#aaa'; }
        }

        async function playRadioStream(url, name) {
            if (!url) return;
            stopRadio();
            const rs = document.getElementById('radio-status');
            rs.innerHTML = '🔄 Подключение... <span class="spinner"></span>';
            rs.style.color = '#ffa500';
            try {
                const audio = new Audio();
                audio.crossOrigin = 'anonymous';
                const connectPromise = new Promise((resolve, reject) => {
                    let resolved = false;
                    audio.oncanplay = () => { if (!resolved) { resolved = true; resolve(true); } };
                    audio.onerror = () => { if (!resolved) { resolved = true; reject(new Error('Ошибка потока')); } };
                    setTimeout(() => { if (!resolved) { resolved = true; reject(new Error('Таймаут 12с')); } }, 12000);
                });
                audio.src = url;
                await connectPromise;
                const ctx = initAudio();
                if (ctx.state === 'suspended') await ctx.resume();
                applySavedSettings();
                if (radioSource) try { radioSource.disconnect(); } catch(e) {}
                radioSource = ctx.createMediaElementSource(audio);
                radioSource.connect(graphInput || buildAudioGraph());
                radioAudio = audio;
                await audio.play();
                rs.innerHTML = `🎵 ${name || 'Радио'}`;
                rs.style.color = '#4caf50';
            } catch (err) {
                let msg = err.message;
                if (msg.includes('Failed to fetch') || msg.includes('NetworkError')) msg = 'Не удалось подключиться. Возможно нужен VPN.';
                rs.innerHTML = `❌ ${msg}`;
                rs.style.color = '#e94560';
                stopRadio();
            }
        }

        function saveSettings() {
            const sl = eqBandsDiv.querySelectorAll('input[type="range"]');
            localStorage.setItem('player-settings', JSON.stringify({
                reverb: reverbSlider.value, delay: delaySlider.value, stereo: stereoSlider.value,
                eq: Array.from(sl).map(s => parseFloat(s.value)), gapless: chkGapless.checked
            }));
        }

        function loadSettings() {
            const raw = localStorage.getItem('player-settings');
            if (!raw) return;
            try {
                const s = JSON.parse(raw);
                if (s.reverb !== undefined) { reverbSlider.value = s.reverb; valReverb.textContent = s.reverb; }
                if (s.delay !== undefined) { delaySlider.value = s.delay; valDelay.textContent = s.delay; }
                if (s.stereo !== undefined) { stereoSlider.value = s.stereo; valStereo.textContent = s.stereo; }
                if (s.eq) { const sl = eqBandsDiv.querySelectorAll('input[type="range"]'); s.eq.forEach((v, i) => { if (sl[i]) sl[i].value = v; }); }
                if (s.gapless !== undefined) chkGapless.checked = s.gapless;
            } catch (e) {}
        }

        function applySavedSettings() {
            if (!graphBuilt) return;
            if (reverbWetGain) reverbWetGain.gain.value = parseFloat(reverbSlider.value) / 100;
            if (delayWetGain) delayWetGain.gain.value = parseFloat(delaySlider.value) / 100;
            if (stereoWidener) stereoWidener.gain.value = parseFloat(stereoSlider.value) / 100;
            const sl = eqBandsDiv.querySelectorAll('input[type="range"]');
            sl.forEach((s, i) => { if (eqFilters[i]) eqFilters[i].gain.value = parseFloat(s.value); });
        }

        function parseCue(cueText) {
            const tracks = [];
            const lines = cueText.split(/\r?\n/);
            let currentTrack = null;
            const timeToSeconds = (str) => {
                const parts = str.split(':');
                return parseInt(parts[0]) * 60 + parseInt(parts[1]) + (parts[2] ? parseInt(parts[2]) / 75 : 0);
            };
            for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed) continue;
                if (trimmed.toUpperCase().startsWith('TRACK ')) {
                    const match = trimmed.match(/^TRACK\s+(\d+)\s+(.+)$/i);
                    if (match) currentTrack = { number: parseInt(match[1]), title: `Track ${match[1]}`, performer: '', index01: null };
                } else if (currentTrack) {
                    if (trimmed.toUpperCase().startsWith('TITLE ')) {
                        const m = trimmed.match(/^TITLE\s+"(.+)"$/i) || trimmed.match(/^TITLE\s+(.+)$/i);
                        if (m) currentTrack.title = m[1];
                    } else if (trimmed.toUpperCase().startsWith('PERFORMER ')) {
                        const m = trimmed.match(/^PERFORMER\s+"(.+)"$/i) || trimmed.match(/^PERFORMER\s+(.+)$/i);
                        if (m) currentTrack.performer = m[1];
                    } else if (trimmed.toUpperCase().startsWith('INDEX 01 ')) {
                        const m = trimmed.match(/^INDEX 01\s+(.+)$/i);
                        if (m) currentTrack.index01 = timeToSeconds(m[1]);
                    }
                }
            }
            return tracks.filter(t => t.index01 !== null);
        }

        async function loadFile(index) {
            if (isLoadingTrack) {
                await new Promise(r => { let check = setInterval(() => { if (!isLoadingTrack) { clearInterval(check); r(); } }, 50); });
            }
            const item = playlist[index];
            const cacheKey = item.isCue ? `${item.file.name}_${item.cueStart}_${item.cueEnd}` : item.file.name;
            if (bufferCache.has(cacheKey)) return bufferCache.get(cacheKey);
            isLoadingTrack = true;
            try {
                const ab = await item.file.arrayBuffer();
                const ctx = initAudio();
                const fullBuffer = await ctx.decodeAudioData(ab);
                let resultBuffer = fullBuffer;
                if (item.isCue && item.cueStart !== null) {
                    const startSample = Math.floor(item.cueStart * fullBuffer.sampleRate);
                    const endSample = item.cueEnd ? Math.floor(item.cueEnd * fullBuffer.sampleRate) : fullBuffer.length;
                    const frameCount = Math.min(endSample - startSample, fullBuffer.length - startSample);
                    if (frameCount > 0) {
                        const slicedBuffer = audioContext.createBuffer(fullBuffer.numberOfChannels, frameCount, fullBuffer.sampleRate);
                        for (let ch = 0; ch < fullBuffer.numberOfChannels; ch++) {
                            slicedBuffer.getChannelData(ch).set(fullBuffer.getChannelData(ch).subarray(startSample, startSample + frameCount));
                        }
                        resultBuffer = slicedBuffer;
                    }
                }
                if (bufferCache.size > MAX_CACHE) bufferCache.delete(bufferCache.keys().next().value);
                bufferCache.set(cacheKey, resultBuffer);
                return resultBuffer;
            } finally { isLoadingTrack = false; }
        }

        function killAllSources() {
            if (currentSource) {
                try { currentSource.stop(); } catch(e) {}
                try { currentSource.disconnect(); } catch(e) {}
                currentSource = null;
            }
            if (animationId) cancelAnimationFrame(animationId);
        }

        function startSource(offset) {
            if (isSeeking || !currentBuffer) return;
            const ctx = initAudio();
            killAllSources();
            let startOffset = Math.min(Math.max(0, offset), currentBuffer.duration - 0.1);
            currentSource = ctx.createBufferSource();
            currentSource.buffer = currentBuffer;
            currentSource.connect(graphInput);
            currentSource.onended = () => {
                if (chkGapless.checked && nextBuffer && !isSeeking) {
                    currentBuffer = nextBuffer;
                    currentIndex++;
                    nextBuffer = null;
                    trackTitle.textContent = playlist[currentIndex]?.name || '';
                    renderPlaylist();
                    startSource(0);
                    preloadNext();
                } else {
                    isPlaying = false;
                    btnPlay.textContent = '▶️';
                    pausedAt = 0;
                    seekBar.value = 0;
                    currentSource = null;
                    updateTimeDisplay();
                }
            };
            currentSource.start(0, startOffset);
            startTime = ctx.currentTime - startOffset;
            pausedAt = startOffset;
            isPlaying = true;
            btnPlay.textContent = '⏸️';
            startTimeUpdate();
        }

        async function preloadNext() {
            const nextIdx = currentIndex + 1;
            if (nextIdx >= playlist.length) { nextBuffer = null; return; }
            try { nextBuffer = await loadFile(nextIdx); } catch(e) { nextBuffer = null; }
        }

        function getCurrentTime() {
            if (!currentBuffer || !audioContext) return pausedAt;
            if (!isPlaying || !currentSource) return pausedAt;
            return Math.min(currentBuffer.duration, Math.max(0, audioContext.currentTime - startTime));
        }

        function actionPlay() {
            if (!currentBuffer) return;
            stopRadio();
            if (isPlaying) {
                pausedAt = getCurrentTime();
                killAllSources();
                isPlaying = false;
                btnPlay.textContent = '▶️';
                updateTimeDisplay();
            } else { startSource(pausedAt); }
        }

        function actionStop() {
            killAllSources();
            isPlaying = false;
            btnPlay.textContent = '▶️';
            pausedAt = 0;
            seekBar.value = 0;
            updateTimeDisplay();
        }

        function actionRewind() {
            if (!currentBuffer) return;
            const wasPlaying = isPlaying;
            const t = Math.max(0, getCurrentTime() - 10);
            killAllSources();
            isPlaying = false;
            pausedAt = t;
            seekBar.value = (t / currentBuffer.duration) * 100;
            updateTimeDisplay();
            if (wasPlaying) startSource(t);
        }

        function actionForward() {
            if (!currentBuffer) return;
            const wasPlaying = isPlaying;
            const t = Math.min(currentBuffer.duration, getCurrentTime() + 10);
            killAllSources();
            isPlaying = false;
            pausedAt = t;
            seekBar.value = (t / currentBuffer.duration) * 100;
            updateTimeDisplay();
            if (wasPlaying) startSource(t);
        }

        async function actionSelectTrack(index) {
            if (index < 0 || index >= playlist.length || isLoadingTrack) return;
            stopRadio();
            killAllSources();
            isPlaying = false;
            btnPlay.textContent = '▶️';
            currentBuffer = null;
            nextBuffer = null;
            pausedAt = 0;
            seekBar.value = 0;
            currentIndex = index;
            try {
                currentBuffer = await loadFile(index);
                trackTitle.textContent = playlist[index].name;
                renderPlaylist();
                updateTimeDisplay();
            } catch(e) { trackTitle.textContent = 'Ошибка'; }
        }

        function actionSeekTo(percent) {
            if (!currentBuffer) return;
            const t = (percent / 100) * currentBuffer.duration;
            const wasPlaying = isPlaying;
            killAllSources();
            isPlaying = false;
            isSeeking = true;
            pausedAt = t;
            seekBar.value = percent;
            updateTimeDisplay();
            if (seekTimeout) clearTimeout(seekTimeout);
            seekTimeout = setTimeout(() => { isSeeking = false; if (wasPlaying) startSource(t); }, 200);
        }

        btnPlay.onclick = actionPlay;
        btnStop.onclick = actionStop;
        btnPrev.onclick = actionRewind;
        btnNext.onclick = actionForward;
        chkGapless.onchange = saveSettings;

        let seekStart = false;
        seekBar.onpointerdown = () => { if (currentBuffer) { seekStart = true; killAllSources(); isPlaying = false; } };
        seekBar.oninput = () => { if (currentBuffer && seekStart) { pausedAt = (parseFloat(seekBar.value) / 100) * currentBuffer.duration; updateTimeDisplay(); } };
        seekBar.onpointerup = () => { if (currentBuffer && seekStart) { seekStart = false; actionSeekTo(parseFloat(seekBar.value)); } };

        function startTimeUpdate() {
            function update() {
                if (!isPlaying || !currentSource || seekStart) { if (!seekStart) updateTimeDisplay(); animationId = requestAnimationFrame(update); return; }
                if (currentBuffer) seekBar.value = (getCurrentTime() / currentBuffer.duration) * 100;
                updateTimeDisplay();
                animationId = requestAnimationFrame(update);
            }
            update();
        }

        function updateTimeDisplay() {
            if (!currentBuffer) { trackTime.textContent = '0:00 / 0:00'; return; }
            const cur = isPlaying ? getCurrentTime() : pausedAt;
            trackTime.textContent = `${formatTime(cur)} / ${formatTime(currentBuffer.duration)}`;
        }

        function formatTime(s) { const m = Math.floor(s / 60), sec = Math.floor(s % 60); return `${m}:${sec.toString().padStart(2,'0')}`; }

        async function processFiles(files) {
            showLoader('🎵 Обработка треков...', 'Подготовка...');
            if (!fullPlaylist) fullPlaylist = [];
            const audioFiles = [], cueFiles = [];

            for (const file of files) {
                const ext = file.name.split('.').pop().toLowerCase();
                if (['mp3','flac','wav','ogg','m4a','opus','aac'].includes(ext)) audioFiles.push(file);
                else if (ext === 'cue') cueFiles.push(file);
            }

            updateLoaderProgress(30, `Найдено: ${audioFiles.length} аудио, ${cueFiles.length} cue`);

            for (const cue of cueFiles) {
                try {
                    const text = await cue.text();
                    const tracks = parseCue(text);
                    if (!tracks.length) continue;
                    const cueBase = cue.name.replace(/\.cue$/i, '');
                    let matched = audioFiles.find(a => a.name.replace(/\.[^.]+$/, '').toLowerCase() === cueBase.toLowerCase());
                    if (matched) {
                        tracks.forEach((track, idx) => {
                            fullPlaylist.push({
                                name: track.performer ? `${track.performer} — ${track.title}` : `${track.number}. ${track.title}`,
                                file: matched,
                                isCue: true,
                                cueStart: track.index01,
                                cueEnd: tracks[idx+1]?.index01 || null
                            });
                        });
                    }
                } catch(e) {}
            }

            const usedFiles = new Set(fullPlaylist.map(t => t.file));
            for (const audio of audioFiles) {
                if (!usedFiles.has(audio)) fullPlaylist.push({ name: audio.name, file: audio, isCue: false });
            }

            fullPlaylist.sort((a,b) => a.name.localeCompare(b.name));
            folderNameEl.textContent = `🎵 ${fullPlaylist.length} треков`;
            playlist = [...fullPlaylist];
            resetPlayer();
            renderPlaylist();
            applySearchFilter();
            hideLoader();
        }

        function resetPlayer() { killAllSources(); isPlaying = false; btnPlay.textContent = '▶️'; currentBuffer = null; currentIndex = -1; pausedAt = 0; seekBar.value = 0; trackTitle.textContent = 'Нет трека'; updateTimeDisplay(); }

                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    if (confirm(`Удалить "${item.name}"?`)) {
                        const globalIndex = fullPlaylist.findIndex(fi => fi.file === item.file);

                            fullPlaylist.splice(globalIndex, 1);
                        }
                        filterPlaylist();
                        folderNameEl.textContent = `🎵 ${fullPlaylist.length} треков`;
                        if (currentIndex === i) {
                            actionStop();
                            currentIndex = -1;
                            currentBuffer = null;
                            trackTitle.textContent = 'Нет трека';
                        } else if (currentIndex > i) {
                            currentIndex--;
                        }
                        if (fullPlaylist.length === 0) {
                            folderNameEl.textContent = 'Не выбрано';
                            playlistStats.textContent = '';
                        }
                    }
                };

                li.appendChild(span);
                li.appendChild(delBtn);

                playlistEl.appendChild(li);
            }
        }

        async function searchRadioStations(query) {
            if (!query || query.length < 2) { radioStatusEl.textContent = '🔍 Введите минимум 2 символа'; return; }
            radioStatusEl.innerHTML = '🔍 Поиск... <span class="spinner"></span>';
            radioStatusEl.style.color = '#ffa500';
            searchResults = [];
            currentPage = 0;
            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 12000);
                const resp = await fetch(`https://de1.api.radio-browser.info/json/stations/search?name=${encodeURIComponent(query)}&limit=100&hidebroken=true&order=clickcount&reverse=true`, { signal: controller.signal });
                clearTimeout(timeout);
                if (!resp.ok) throw new Error();
                const data = await resp.json();
                for (const s of data) {
                    let url = s.url_resolved || s.url;
                    if (url.includes('.m3u') || url.includes('.pls')) continue;
                    if (url.startsWith('http://')) url = url.replace('http://', 'https://');
                    searchResults.push({ name: s.name, url: url, country: s.country, codec: s.codec });
                }
                renderSearchResults();
                radioStatusEl.innerHTML = searchResults.length ? `✅ Найдено: ${searchResults.length} станций` : '❌ Ничего не найдено';

        }

        // Эффекты

        loadFavorites();
        setInterval(() => { if (isPlaying) localStorage.setItem('player-playback', JSON.stringify({ trackName: playlist[currentIndex]?.name || '', position: getCurrentTime() })); }, 5000);
    </script>
</body>
</html>
